# Continuous integration: lint, unit tests, and workflow validation.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 src tests

      - name: Run unit tests
        run: pytest tests -v

      - name: Validate Snakemake workflow (dry run)
        run: snakemake -n -s workflow/Snakefile
