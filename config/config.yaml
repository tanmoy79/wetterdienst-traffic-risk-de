# Configuration of the wetterdienst-traffic-risk workflow.

# analysis period (the raw accident files cover 2020-2024)
start_year: 2020
end_year: 2024

# how many DWD weather stations to use per federal state
stations_per_state: 2

# accidents farther than this from the nearest station are dropped
max_distance_km: 100

# weather classification thresholds (units kept in the DWD native scale:
# precipitation in mm/h, temperature in deg C, solar in J/cm^2)
rain_threshold: 0.1        # mm/h, from which an hour counts as rainy
heavy_rain_threshold: 4.0  # mm/h, from which rain counts as heavy
frost_threshold: 0.0       # deg C, below which an hour counts as frost
heat_threshold: 30.0       # deg C, from which an hour counts as hot
strong_sun_threshold: 200  # J/cm2, from which sunshine counts as strong

# which research questions to analyse
research_questions: [1, 2, 3, 4]
